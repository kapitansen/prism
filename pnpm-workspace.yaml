packages:
  - 'apps/*'
  - 'packages/*'

# pnpm blocks dependency build scripts (postinstall etc.) by default as a
# supply-chain safeguard. Allow only the deps that need them.
# Prisma — downloads its query engine; esbuild (via tsx) — installs its binary.
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  prisma: true
